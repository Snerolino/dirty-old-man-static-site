name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'index.html'
      - 'styles.css'
      - 'wrangler.toml'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g @cloudflare/wrangler

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name=dirty-old-man-static
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create deployment status
        if: success()
        run: echo "✅ Website deployed successfully to dirtyoldman.com.br"

      - name: Log deployment failure
        if: failure()
        run: echo "❌ Deployment failed - check Cloudflare Pages dashboard"
